name: Build and deploy guild site

on:
  push:
    branches: [main]
  schedule:
    # Daily. The Phase 2 trials optimizer takes ~2-3 min per run; hourly would
    # burn ~2000+ Actions minutes/month. The weekly draw + slow-moving member
    # data do not need hourly rebuilds. Adjust if you split cheap/expensive steps.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # uv provisions Python and installs deps far faster than pip + setup-python,
      # with a warm cache across runs. It reads requires-python from pyproject.
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build static site
        # --no-dev keeps the optional [dev] extras (scipy/numpy/pytest) OFF the
        # build path: the shipped optimizer is pure-Python. uv creates the env
        # and installs the project from pyproject automatically before running.
        run: uv run --no-dev python -m src.build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
